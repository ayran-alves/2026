<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogar</title>
    <style>
        body {
            background-color: lightseagreen;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        button {
            background-color: black;
            color: white;
            font-size: 40px;
            border-radius: 15px;
            padding: 15px 30px;
            width: 200px;
            border: none;
            margin: 60px;

        }

        h1 {
            font-size: 90px;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }

        .botoes {
            display: flex;
            justify-content: center;
        }
    </style>
</head>

<body>

    <h1>Vamo Jogar Amanha ?</h1>
    <div class="botoes">
        <div class="botaoS">
            <button onclick="sim()">SIM</button>

        </div>
        <div class="botaoN">
            <button onclick="desvia()" id="botao" onmouseover="desvia()">NÃO</button>
        </div>
    </div>
    <script>
        function sim() {
            location.href ="https://www.youtube.com/watch?v=pDTFR7ivvgE&list=PLNvnh4cN6-ARQrzOrE76arfk03r_Eswoz"
        }
        function desvia() {
            let botao = document.getElementById("botao")
            botao.style.position = "Absolute"
            botao.style.bottom = gerarPosicao(10, 80)
            botao.style.left = gerarPosicao(10,80)
        }
        function gerarPosicao(min, max) {
            return (Math.random()*(max-min)+min)+"%"
        }
    </script>

</body>

</html>
